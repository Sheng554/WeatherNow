<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WeatherNow · Real‑time Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🌤️ WeatherNow</h1>

        <!-- Search Bar -->
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Enter city name.🌍">
            <button id="searchBtn">🔍 Search</button>
        </div>

        <div class="error-banner hidden" id="errorBanner">
            <p>⚠️ <span id="errorMessage">Error message</span></p>
            <button class="retry-btn" id="retryBtn">🔄 Retry</button>
        </div>

        <!-- Current Weather Card (skeleton placeholders) -->
        <div class="current-card" id="currentWeatherCard">
            <div class="skeleton city-skeleton"></div>
            <div class="skeleton temp-skeleton"></div>
            <div class="skeleton desc-skeleton"></div>
            <div class="detail-row">
                <div class="skeleton detail-skeleton"></div>
                <div class="skeleton detail-skeleton"></div>
            </div>
            <div class="skeleton time-skeleton"></div>
        </div>

        <!-- 7‑Day Forecast Header -->
        <div class="forecast-header">
            <h2>📅 7‑Day Forecast</h2>
        </div>

        <!-- Forecast Row (7 skeleton cards) -->
        <div class="forecast-row" id="forecastRow">
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
            <div class="forecast-card skeleton-card">
                <div class="skeleton day-skeleton"></div>
                <div class="skeleton icon-skeleton"></div>
                <div class="skeleton temp-skeleton"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
